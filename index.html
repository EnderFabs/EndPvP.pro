<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndPvP Seite</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Inhalt der Seite */
  .content {
    flex: 1;
    padding: 20px;
  }

  /* Footer mit Button */
  .footer {
    text-align: center;
    padding: 15px;
    background-color: #111;
  }

  .shop-button {
    background-color: #738374; /* Farbe kannst du ändern */
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background-color 0.3s;
  }

  .shop-button:hover {
    background-color: #5a5f5a; /* dunkler beim Hover */
  }
</style>
</head>
<body>

<div class="content">
  <h1>Willkommen auf EndPvP</h1>
  <p>Hier kommt dein Inhalt hin.</
